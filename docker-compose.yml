version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: smart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: smart_maintenance
      MYSQL_USER: smart_user
      MYSQL_PASSWORD: smart_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai_service:
    build: ./ai_service
    container_name: smart-ai
    restart: unless-stopped
    volumes:
      - ./models:/app/models
    environment:
      - MODEL_DIR=/app/models
      - HOST=0.0.0.0
      - PORT=8000
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    container_name: smart-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      ai_service:
        condition: service_started
    environment:
      - DATABASE_URL=mysql://smart_user:smart_password@mysql:3306/smart_maintenance
      - JWT_SECRET=smart-maintenance-jwt-secret-prod-2024
      - AI_SERVICE_URL=http://ai_service:8000
      - PORT=5000
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    container_name: smart-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  mysql_data:
  uploads_data:
